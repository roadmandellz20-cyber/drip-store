<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MUGEN DISTRICT Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="archive-root">
  <div class="noise" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="cursor" aria-hidden="true"></div>

  <main>
    <section class="hero reveal">
      <div class="hero-bg" aria-hidden="true"></div>
      <div class="hero-overlay" aria-hidden="true"></div>

      <div class="hero-content">
        <h1 class="hero-title" data-glitch="MUGEN DISTRICT">MUGEN DISTRICT</h1>
        <p class="hero-sub">Urban Tokyo Chaos</p>
        <button class="cop-btn" data-glitch="ENTER ARCHIVE">ENTER ARCHIVE</button>
      </div>
    </section>

    <section class="drop reveal" id="grid">
      <h2 class="drop-title">MUGEN PRODUCT GRID</h2>

      <div class="mugen-grid">
        <article class="product-card tilt-a reveal">
          <div class="tag">LIMITED</div>
          <img src="/archive/assets/luffy-01.jpg" alt="Luffy design 01" class="card-img" />
          <h3 class="card-name">LUFFY-01</h3>
        </article>

        <article class="product-card tilt-b reveal">
          <div class="tag">LIMITED</div>
          <img src="/archive/assets/ichigo-01.jpg" alt="Ichigo design 01" class="card-img" />
          <h3 class="card-name">ICHIGO-01</h3>
        </article>

        <article class="product-card tilt-c reveal">
          <div class="tag">LIMITED</div>
          <img src="/archive/assets/ulquiorra-01.jpg" alt="Ulquiorra design 01" class="card-img" />
          <h3 class="card-name">ULQUIORRA-01</h3>
        </article>

        <article class="product-card tilt-d reveal">
          <div class="tag">AVAILABLE</div>
          <img src="/archive/assets/luffy-02.jpg" alt="Luffy design 02" class="card-img" />
          <h3 class="card-name">LUFFY-02</h3>
        </article>

        <article class="product-card tilt-e reveal">
          <div class="tag">AVAILABLE</div>
          <img src="/archive/assets/ichigo-02.jpg" alt="Ichigo design 02" class="card-img" />
          <h3 class="card-name">ICHIGO-02</h3>
        </article>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
